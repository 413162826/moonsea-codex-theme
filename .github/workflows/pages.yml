name: 发布主题网页

on:
  push:
    branches: [main]
    paths:
      - "site/**"
      - "assets/wallpapers/**"
      - "src/theme-catalog.mjs"
      - "src/pro-theme-catalog.mjs"
      - "src/wallpaper-catalog.mjs"
      - "scripts/sync-wallpapers.mjs"
      - "package.json"
      - "package-lock.json"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run wallpapers
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v4
        with:
          path: site
      - name: 发布
        id: deployment
        uses: actions/deploy-pages@v4
