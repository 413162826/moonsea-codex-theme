name: 检查

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: 验证 Windows 安装与卸载
        if: runner.os == 'Windows'
        shell: powershell
        run: ./tests/windows-installer-smoke.ps1
      - name: 验证 macOS 安装与卸载
        if: runner.os == 'macOS'
        run: zsh ./tests/macos-installer-smoke.sh
      - name: 检查 Windows PowerShell 5.1 兼容性
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          Get-ChildItem scripts/windows -Filter *.ps1 | ForEach-Object {
            $bytes = [System.IO.File]::ReadAllBytes($_.FullName)
            if ($bytes | Where-Object { $_ -ge 128 }) {
              throw "$($_.Name) contains non-ASCII bytes and is unsafe on localized Windows PowerShell 5.1"
            }
            $parseTokens = $null
            $parseErrors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$parseTokens, [ref]$parseErrors)
            if ($parseErrors.Count -gt 0) { throw ($parseErrors | Out-String) }
          }
      - name: 检查 macOS 脚本语法
        if: runner.os == 'macOS'
        run: |
          zsh -n Install.command
          zsh -n Uninstall.command
          zsh -n scripts/macos/*.sh
          zsh -n scripts/macos/*.command
