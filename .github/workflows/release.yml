name: 发布安装包

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: oven-sh/setup-bun@v2.2.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: 生成 Windows 安装包
        shell: pwsh
        run: |
          $stage = Join-Path $PWD ".build/Moonsea-Codex-Windows-x64"
          New-Item -ItemType Directory -Path "$stage/tools" -Force | Out-Null
          New-Item -ItemType Directory -Path "$stage/scripts/windows" -Force | Out-Null
          Copy-Item README.md,LICENSE,ASSET-LICENSE.md,Install-Moonsea-Windows.cmd,Uninstall-Moonsea-Windows.cmd -Destination $stage
          Copy-Item theme,assets,site -Destination $stage -Recurse
          Copy-Item scripts/windows/* -Destination "$stage/scripts/windows"
          bun build ./src/build-static.mjs --compile --target=bun-windows-x64 --outfile "$stage/tools/moonsea-builder.exe"
          bun build ./src/manager.mjs --compile --target=bun-windows-x64 --outfile "$stage/tools/moonsea-manager.exe"
          $env:MOONSEA_PROJECT_ROOT = $stage
          & "$stage/tools/moonsea-builder.exe" --theme-version
          ./tests/windows-installer-smoke.ps1 -PackageRoot $stage -BuilderPath "$stage/tools/moonsea-builder.exe"
          Compress-Archive -Path "$stage/*" -DestinationPath "$PWD/Moonsea-Codex-Windows-x64.zip"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-package
          path: Moonsea-Codex-Windows-x64.zip

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: oven-sh/setup-bun@v2.2.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: 生成 macOS 安装包
        run: |
          set -euo pipefail
          make_package() {
            local arch="$1"
            local target="$2"
            local stage="$PWD/.build/Moonsea-Codex-macOS-$arch"
            mkdir -p "$stage/tools" "$stage/scripts/macos"
            cp README.md LICENSE ASSET-LICENSE.md Install-Moonsea-macOS.command Uninstall-Moonsea-macOS.command "$stage/"
            cp -R theme assets site "$stage/"
            cp scripts/macos/* "$stage/scripts/macos/"
            bun build ./src/build-static.mjs --compile --target="$target" --outfile "$stage/tools/moonsea-builder"
            bun build ./src/manager.mjs --compile --target="$target" --outfile "$stage/tools/moonsea-manager"
            chmod +x "$stage"/*.command "$stage/tools/moonsea-builder" "$stage/tools/moonsea-manager" "$stage/scripts/macos"/*.sh "$stage/scripts/macos"/*.command
            tar -czf "$PWD/Moonsea-Codex-macOS-$arch.tar.gz" -C "$stage" .
          }
          make_package Apple-Silicon bun-darwin-arm64
          make_package Intel bun-darwin-x64
          case "$(uname -m)" in
            arm64) TEST_ARCH=Apple-Silicon ;;
            *) TEST_ARCH=Intel ;;
          esac
          MOONSEA_PROJECT_ROOT="$PWD/.build/Moonsea-Codex-macOS-$TEST_ARCH" \
            "$PWD/.build/Moonsea-Codex-macOS-$TEST_ARCH/tools/moonsea-builder" --theme-version
          MOONSEA_TEST_PACKAGE_ROOT="$PWD/.build/Moonsea-Codex-macOS-$TEST_ARCH" \
            MOONSEA_TEST_BUILDER_PATH="$PWD/.build/Moonsea-Codex-macOS-$TEST_ARCH/tools/moonsea-builder" \
            zsh ./tests/macos-installer-smoke.sh
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-packages
          path: Moonsea-Codex-macOS-*.tar.gz

  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
