name: 发布安装包

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: oven-sh/setup-bun@v2.2.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-dotnet@v5.0.0
        with:
          dotnet-version: 8.0.x
      - run: npm ci
      - name: 校验发布标签与产品版本
        shell: pwsh
        run: |
          $packageVersion = [string](Get-Content package.json -Raw -Encoding UTF8 | ConvertFrom-Json).version
          if ($env:GITHUB_REF_NAME -ne "v$packageVersion") {
            throw "Release tag $env:GITHUB_REF_NAME does not match package version v$packageVersion"
          }
      - run: npm test
      - name: 安装 Windows 安装器编译器
        shell: pwsh
        run: choco install innosetup --no-progress -y
      - name: 生成 Windows 安装包
        shell: pwsh
        run: |
          $releaseRoot = Join-Path $PWD ".build/windows-release"
          $setupPath = (& ./scripts/windows/Build-Moonsea-Setup.ps1 -OutputDirectory $releaseRoot | Select-Object -Last 1)
          $stage = Join-Path $releaseRoot "Moonsea-Codex-Windows-x64"
          ./tests/windows-updater-smoke.ps1 -PackageRoot $stage
          Compress-Archive -Path "$stage/*" -DestinationPath "$PWD/Moonsea-Codex-Windows-x64.zip"
          Copy-Item -LiteralPath $setupPath -Destination "$PWD/Moonsea-Codex-Windows-x64-Setup.exe"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-package
          path: |
            Moonsea-Codex-Windows-x64.zip
            Moonsea-Codex-Windows-x64-Setup.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: oven-sh/setup-bun@v2.2.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: 生成 macOS 安装包
        run: |
          set -euo pipefail
          stage="$PWD/.build/Moonsea-Codex-macOS"
          tool_stage="$PWD/.build/macos-universal-tools"
          mkdir -p "$stage/tools" "$stage/scripts/macos" "$tool_stage"
          cp README.md LICENSE ASSET-LICENSE.md package.json Install.command Uninstall.command "$stage/"
          cp -R theme assets site admin "$stage/"
          cp scripts/macos/* "$stage/scripts/macos/"
          for target in bun-darwin-arm64 bun-darwin-x64; do
            arch="${target#bun-darwin-}"
            bun build ./src/build-static.mjs --compile --target="$target" --outfile "$tool_stage/moonsea-builder-$arch"
            bun build ./src/manager.mjs --compile --target="$target" --outfile "$tool_stage/moonsea-manager-$arch"
            codesign --remove-signature "$tool_stage/moonsea-builder-$arch" 2>/dev/null || true
            codesign --remove-signature "$tool_stage/moonsea-manager-$arch" 2>/dev/null || true
          done
          lipo -create "$tool_stage/moonsea-builder-arm64" "$tool_stage/moonsea-builder-x64" -output "$stage/tools/moonsea-builder"
          lipo -create "$tool_stage/moonsea-manager-arm64" "$tool_stage/moonsea-manager-x64" -output "$stage/tools/moonsea-manager"
          codesign --force --sign - "$stage/tools/moonsea-builder"
          codesign --force --sign - "$stage/tools/moonsea-manager"
          chmod +x "$stage"/*.command "$stage/tools/moonsea-builder" "$stage/tools/moonsea-manager" "$stage/scripts/macos"/*.sh "$stage/scripts/macos"/*.command
          MOONSEA_PROJECT_ROOT="$stage" "$stage/tools/moonsea-builder" --theme-version
          MOONSEA_TEST_PACKAGE_ROOT="$stage" \
            MOONSEA_TEST_BUILDER_PATH="$stage/tools/moonsea-builder" \
            zsh ./tests/macos-installer-smoke.sh
          MOONSEA_TEST_PACKAGE_ROOT="$stage" zsh ./tests/macos-updater-smoke.sh
          ditto -c -k --sequesterRsrc --keepParent "$stage" "$PWD/Moonsea-Codex-macOS.zip"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-packages
          path: Moonsea-Codex-macOS.zip

  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          windows_file="artifacts/Moonsea-Codex-Windows-x64.zip"
          windows_installer="artifacts/Moonsea-Codex-Windows-x64-Setup.exe"
          macos_file="artifacts/Moonsea-Codex-macOS.zip"
          windows_sha="$(sha256sum "$windows_file" | cut -d' ' -f1)"
          windows_installer_sha="$(sha256sum "$windows_installer" | cut -d' ' -f1)"
          macos_sha="$(sha256sum "$macos_file" | cut -d' ' -f1)"
          windows_size="$(stat -c%s "$windows_file")"
          windows_installer_size="$(stat -c%s "$windows_installer")"
          macos_size="$(stat -c%s "$macos_file")"
          jq -n \
            --arg version "$version" \
            --arg publishedAt "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg notes "Windows 桌面安装器上线，支持助手内校验下载、静默升级与自动重启" \
            --arg windowsUrl "https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME/Moonsea-Codex-Windows-x64.zip" \
            --arg windowsSha "$windows_sha" \
            --argjson windowsSize "$windows_size" \
            --arg windowsInstallerUrl "https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME/Moonsea-Codex-Windows-x64-Setup.exe" \
            --arg windowsInstallerSha "$windows_installer_sha" \
            --argjson windowsInstallerSize "$windows_installer_size" \
            --arg macosUrl "https://github.com/$GITHUB_REPOSITORY/releases/download/$GITHUB_REF_NAME/Moonsea-Codex-macOS.zip" \
            --arg macosSha "$macos_sha" \
            --argjson macosSize "$macos_size" \
            '{
              schemaVersion: 1,
              version: $version,
              publishedAt: $publishedAt,
              notes: $notes,
              platforms: {
                windows: {
                  url: $windowsUrl,
                  sha256: $windowsSha,
                  size: $windowsSize,
                  installer: {
                    url: $windowsInstallerUrl,
                    sha256: $windowsInstallerSha,
                    size: $windowsInstallerSize
                  }
                },
                macos: { url: $macosUrl, sha256: $macosSha, size: $macosSize }
              }
            }' > artifacts/update.json
          gh release create "$GITHUB_REF_NAME" artifacts/*.zip artifacts/*.exe artifacts/update.json \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
