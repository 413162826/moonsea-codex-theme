name: 发布安装包

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: oven-sh/setup-bun@v2.2.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: 生成 Windows 安装包
        shell: pwsh
        run: |
          $stage = Join-Path $PWD ".build/Moonsea-Codex-Windows-x64"
          New-Item -ItemType Directory -Path "$stage/tools" -Force | Out-Null
          New-Item -ItemType Directory -Path "$stage/scripts/windows" -Force | Out-Null
          Copy-Item README.md,LICENSE,ASSET-LICENSE.md,Install.cmd,Uninstall.cmd -Destination $stage
          Copy-Item theme,assets,site -Destination $stage -Recurse
          Copy-Item scripts/windows/* -Destination "$stage/scripts/windows"
          bun build ./src/build-static.mjs --compile --target=bun-windows-x64 --outfile "$stage/tools/moonsea-builder.exe"
          bun build ./src/manager.mjs --compile --target=bun-windows-x64 --outfile "$stage/tools/moonsea-manager.exe"
          $env:MOONSEA_PROJECT_ROOT = $stage
          & "$stage/tools/moonsea-builder.exe" --theme-version
          ./tests/windows-installer-smoke.ps1 -PackageRoot $stage -BuilderPath "$stage/tools/moonsea-builder.exe"
          Compress-Archive -Path "$stage/*" -DestinationPath "$PWD/Moonsea-Codex-Windows-x64.zip"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: windows-package
          path: Moonsea-Codex-Windows-x64.zip

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v7.0.1
      - uses: oven-sh/setup-bun@v2.2.0
      - uses: actions/setup-node@v7.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test
      - name: 生成 macOS 安装包
        run: |
          set -euo pipefail
          stage="$PWD/.build/Moonsea-Codex-macOS"
          tool_stage="$PWD/.build/macos-universal-tools"
          mkdir -p "$stage/tools" "$stage/scripts/macos" "$tool_stage"
          cp README.md LICENSE ASSET-LICENSE.md Install.command Uninstall.command "$stage/"
          cp -R theme assets site "$stage/"
          cp scripts/macos/* "$stage/scripts/macos/"
          for target in bun-darwin-arm64 bun-darwin-x64; do
            arch="${target#bun-darwin-}"
            bun build ./src/build-static.mjs --compile --target="$target" --outfile "$tool_stage/moonsea-builder-$arch"
            bun build ./src/manager.mjs --compile --target="$target" --outfile "$tool_stage/moonsea-manager-$arch"
            codesign --remove-signature "$tool_stage/moonsea-builder-$arch" 2>/dev/null || true
            codesign --remove-signature "$tool_stage/moonsea-manager-$arch" 2>/dev/null || true
          done
          lipo -create "$tool_stage/moonsea-builder-arm64" "$tool_stage/moonsea-builder-x64" -output "$stage/tools/moonsea-builder"
          lipo -create "$tool_stage/moonsea-manager-arm64" "$tool_stage/moonsea-manager-x64" -output "$stage/tools/moonsea-manager"
          codesign --force --sign - "$stage/tools/moonsea-builder"
          codesign --force --sign - "$stage/tools/moonsea-manager"
          chmod +x "$stage"/*.command "$stage/tools/moonsea-builder" "$stage/tools/moonsea-manager" "$stage/scripts/macos"/*.sh "$stage/scripts/macos"/*.command
          MOONSEA_PROJECT_ROOT="$stage" "$stage/tools/moonsea-builder" --theme-version
          MOONSEA_TEST_PACKAGE_ROOT="$stage" \
            MOONSEA_TEST_BUILDER_PATH="$stage/tools/moonsea-builder" \
            zsh ./tests/macos-installer-smoke.sh
          ditto -c -k --sequesterRsrc --keepParent "$stage" "$PWD/Moonsea-Codex-macOS.zip"
      - uses: actions/upload-artifact@v7.0.1
        with:
          name: macos-packages
          path: Moonsea-Codex-macOS.zip

  release:
    needs: [windows, macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts
          merge-multiple: true
      - name: 创建 GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" artifacts/* \
            --repo "$GITHUB_REPOSITORY" \
            --title "$GITHUB_REF_NAME" \
            --generate-notes
